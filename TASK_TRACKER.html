<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YoSnowMow — Task Tracker</title>
  <style>
    :root {
      --blue:       #1A6FDB;
      --blue-dark:  #0F4FA8;
      --blue-light: #E8F1FC;
      --snow:       #F0F6FF;
      --gray-100:   #F5F7FA;
      --gray-200:   #E4E8EF;
      --gray-400:   #9AA5B4;
      --gray-600:   #4A5568;
      --gray-800:   #1A202C;
      --green:      #27AE60;
      --green-bg:   #EAFAF1;
      --amber:      #F39C12;
      --amber-bg:   #FEF9E7;
      --red:        #E74C3C;
      --red-bg:     #FDEDEC;
      --radius:     8px;
      --shadow:     0 1px 4px rgba(0,0,0,.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--gray-100);
      color: var(--gray-800);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      background: var(--blue);
      color: #fff;
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(26,111,219,.35);
    }
    header .logo { display: flex; align-items: center; gap: 12px; }
    header .logo svg { width: 36px; height: 36px; }
    header h1 { font-size: 22px; font-weight: 700; letter-spacing: -.3px; }
    header .sub { font-size: 12px; opacity: .75; margin-top: 1px; }
    header .reset-btn {
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.35);
      color: #fff;
      padding: 6px 14px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 12px;
      transition: background .15s;
    }
    header .reset-btn:hover { background: rgba(255,255,255,.28); }

    /* ── Summary bar ─────────────────────────────────────────────── */
    .summary-bar {
      background: #fff;
      border-bottom: 1px solid var(--gray-200);
      padding: 14px 28px;
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
    }
    .stat { display: flex; flex-direction: column; }
    .stat .val { font-size: 22px; font-weight: 700; color: var(--blue); }
    .stat .lbl { font-size: 11px; color: var(--gray-400); text-transform: uppercase; letter-spacing: .5px; }

    /* ── Main layout ─────────────────────────────────────────────── */
    main { padding: 24px 28px; max-width: 1080px; }

    /* ── Phase card ──────────────────────────────────────────────── */
    .phase {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      overflow: hidden;
    }

    .phase-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid var(--gray-200);
      transition: background .12s;
    }
    .phase-header:hover { background: var(--gray-100); }

    .phase-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      letter-spacing: .4px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .phase-env .phase-badge { background: #F3E5F5; color: #6A1B9A; }
    .phase-env .progress-fill { background: #8E24AA; }
    .phase-0 .phase-badge { background: #E8EAF6; color: #3949AB; }
    .phase-1 .phase-badge { background: var(--blue-light); color: var(--blue-dark); }
    .phase-2 .phase-badge { background: #E8F5E9; color: #2E7D32; }
    .phase-3 .phase-badge { background: #FFF3E0; color: #E65100; }

    .phase-title { flex: 1; font-weight: 600; font-size: 15px; }
    .phase-meta { font-size: 12px; color: var(--gray-400); }

    .progress-wrap { display: flex; align-items: center; gap: 10px; min-width: 160px; }
    .progress-bar {
      flex: 1;
      height: 8px;
      background: var(--gray-200);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width .4s ease;
    }
    .phase-0 .progress-fill { background: #5C6BC0; }
    .phase-1 .progress-fill { background: var(--blue); }
    .phase-2 .progress-fill { background: var(--green); }
    .phase-3 .progress-fill { background: #FB8C00; }

    .progress-pct { font-size: 12px; font-weight: 600; color: var(--gray-600); min-width: 32px; text-align: right; }

    .chevron { font-size: 12px; color: var(--gray-400); transition: transform .2s; }
    .phase.collapsed .chevron { transform: rotate(-90deg); }

    /* ── Task table ──────────────────────────────────────────────── */
    .task-body { padding: 0 20px 12px; }
    .phase.collapsed .task-body { display: none; }

    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: 6px 10px 6px 0;
      border-bottom: 1px solid var(--gray-200);
    }
    td { padding: 9px 10px 9px 0; border-bottom: 1px solid var(--gray-200); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--gray-100); }

    .task-id {
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 12px;
      font-weight: 600;
      color: var(--blue);
      white-space: nowrap;
    }
    .task-name { max-width: 480px; }
    .task-week { color: var(--gray-400); font-size: 12px; white-space: nowrap; }
    .task-notes { color: var(--gray-600); font-size: 12px; max-width: 280px; }

    /* ── Status pill ─────────────────────────────────────────────── */
    .status-pill {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .15s;
      user-select: none;
    }
    .status-pill:hover { opacity: .8; }

    .status-todo    { background: var(--gray-200); color: var(--gray-600); }
    .status-in-progress { background: var(--amber-bg); color: var(--amber); }
    .status-done    { background: var(--green-bg); color: var(--green); }
    .status-blocked { background: var(--red-bg); color: var(--red); }

    /* ── Legend ──────────────────────────────────────────────────── */
    .legend {
      display: flex;
      gap: 16px;
      align-items: center;
      padding: 10px 28px;
      background: #fff;
      border-top: 1px solid var(--gray-200);
      font-size: 12px;
      color: var(--gray-600);
      flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-note { margin-left: auto; color: var(--gray-400); font-style: italic; }

    @media (max-width: 680px) {
      header { flex-direction: column; align-items: flex-start; gap: 10px; }
      .summary-bar { gap: 16px; padding: 12px 16px; }
      main { padding: 16px; }
      .phase-header { flex-wrap: wrap; gap: 8px; }
      .progress-wrap { min-width: 120px; }
      .task-notes { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 36 36" fill="none">
      <circle cx="18" cy="18" r="18" fill="rgba(255,255,255,.15)"/>
      <!-- Snowflake icon -->
      <line x1="18" y1="6" x2="18" y2="30" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="6" y1="18" x2="30" y2="18" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>

  <button class="reset-btn" onclick="resetAll()">Reset All</button>
</header>

<div class="summary-bar" id="summaryBar">

  <div class="stat"><span class="val" id="stat-done">0</span><span class="lbl">Done</span></div>
  <div class="stat"><span class="val" id="stat-prog">0</span><span class="lbl">In Progress</span></div>
  <div class="stat"><span class="val" id="stat-blocked">0</span><span class="lbl">Blocked</span></div>
  <div class="stat"><span class="val" id="stat-pct">0%</span><span class="lbl">Complete</span></div>
</div>

<main id="main"></main>

<div class="legend">

  <span class="legend-item"><span class="status-pill status-in-progress">In Progress</span></span>
  <span class="legend-item"><span class="status-pill status-done">Done</span></span>
  <span class="legend-item"><span class="status-pill status-blocked">Blocked</span></span>

// ── Status cycling ─────────────────────────────────────────────────────────
const STATUS_CYCLE = ['todo', 'in-progress', 'done', 'blocked'];
const STATUS_LABELS = { 'todo': 'To Do', 'in-progress': 'In Progress', 'done': 'Done', 'blocked': 'Blocked' };

// ── localStorage persistence ───────────────────────────────────────────────
const STORE_KEY = 'yosnowmow-tasks-v1';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
  catch { return {}; }
}

function saveState(state) {
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
}

let taskState = loadState();

function getStatus(id) { return taskState[id] || 'todo'; }

function cycleStatus(id) {
  const cur = getStatus(id);
  const idx = STATUS_CYCLE.indexOf(cur);
  const next = STATUS_CYCLE[(idx + 1) % STATUS_CYCLE.length];
  taskState[id] = next;
  saveState(taskState);
  renderPill(id);
  updatePhaseProgress(id);
  updateSummary();
}

function resetAll() {
  if (!confirm('Reset all task statuses to "To Do"?')) return;
  taskState = {};
  saveState(taskState);
  document.querySelectorAll('[data-task-id]').forEach(el => {
    const id = el.dataset.taskId;
    el.textContent = STATUS_LABELS['todo'];
    el.className = 'status-pill status-todo';
  });
  updateAllPhaseProgress();
  updateSummary();
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderPill(id) {
  const el = document.querySelector(`[data-task-id="${id}"]`);
  if (!el) return;
  const s = getStatus(id);
  el.textContent = STATUS_LABELS[s];
  el.className = `status-pill status-${s}`;
}

function phaseProgress(phase) {
  const ids = phase.tasks.map(t => t.id);
  const done = ids.filter(id => getStatus(id) === 'done').length;
  return { done, total: ids.length, pct: ids.length ? Math.round(done / ids.length * 100) : 0 };
}

function updatePhaseProgress(taskId) {
  // find which phase this task belongs to
  for (const phase of PHASES) {
    if (phase.tasks.some(t => t.id === taskId)) {
      _updatePhaseBar(phase);
      break;
    }
  }
}

function _updatePhaseBar(phase) {
  const { done, total, pct } = phaseProgress(phase);
  const fill = document.getElementById(`fill-${phase.id}`);
  const pctEl = document.getElementById(`pct-${phase.id}`);
  const metaEl = document.getElementById(`meta-${phase.id}`);
  if (fill) fill.style.width = pct + '%';
  if (pctEl) pctEl.textContent = pct + '%';
  if (metaEl) metaEl.textContent = `${done} / ${total} tasks · ${phase.weeks}`;
}

function updateAllPhaseProgress() {
  PHASES.forEach(_updatePhaseBar);
}

function updateSummary() {
  const allIds = PHASES.flatMap(p => p.tasks.map(t => t.id));
  const total = allIds.length;
  const done = allIds.filter(id => getStatus(id) === 'done').length;
  const prog = allIds.filter(id => getStatus(id) === 'in-progress').length;
  const blk  = allIds.filter(id => getStatus(id) === 'blocked').length;
  const pct  = total ? Math.round(done / total * 100) : 0;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-prog').textContent = prog;
  document.getElementById('stat-blocked').textContent = blk;
  document.getElementById('stat-pct').textContent = pct + '%';
}

// ── Build DOM ──────────────────────────────────────────────────────────────
function buildTracker() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  PHASES.forEach(phase => {
    const prog = phaseProgress(phase);

    const div = document.createElement('div');
    div.className = `phase ${phase.cls}`;
    div.id = phase.id;

    div.innerHTML = `
      <div class="phase-header" onclick="togglePhase('${phase.id}')">
        <span class="phase-badge">${phase.badge}</span>
        <span class="phase-title">${phase.title}</span>
        <div class="progress-wrap">
          <div class="progress-bar"><div class="progress-fill" id="fill-${phase.id}" style="width:${prog.pct}%"></div></div>
          <span class="progress-pct" id="pct-${phase.id}">${prog.pct}%</span>
        </div>
        <span class="phase-meta" id="meta-${phase.id}">${prog.done} / ${prog.total} tasks · ${phase.weeks}</span>
        <span class="chevron">&#9660;</span>
      </div>
      <div class="task-body">
        <table>
          <thead>
            <tr>
              <th style="width:72px">ID</th>
              <th>Task</th>
              <th style="width:80px">Week</th>
              <th style="width:100px">Status</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody id="tbody-${phase.id}"></tbody>
        </table>
      </div>
    `;

    main.appendChild(div);

    const tbody = document.getElementById(`tbody-${phase.id}`);
    phase.tasks.forEach(task => {
      const s = getStatus(task.id);
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><span class="task-id">${task.id}</span></td>
        <td class="task-name">${task.name}</td>
        <td class="task-week">${task.week}</td>
        <td>
          <span class="status-pill status-${s}"
                data-task-id="${task.id}"
                onclick="cycleStatus('${task.id}')">${STATUS_LABELS[s]}</span>
        </td>
        <td class="task-notes">${task.notes}</td>
      `;
      tbody.appendChild(tr);
    });
  });

  updateSummary();
}

function togglePhase(id) {
  document.getElementById(id).classList.toggle('collapsed');
}

buildTracker();
</script>
</body>
</html>
