# ============================================================
# application-dev.yml — Dev profile overrides
# Active when SPRING_PROFILE=dev (the default)
#
# Key differences from prod:
#   - Spring Boot runs on port 8081 (avoids conflict with
#     Firestore emulator which also uses port 8080)
#   - Firebase SDK points at local emulator (not live project)
#   - Quartz uses in-memory store (no database needed)
#   - Debug logging for app and security layers
# ============================================================

server:
  port: 8081

yosnowmow:
  firebase:
    use-emulator:  true
    emulator-host: localhost:8080   # Firestore emulator port (firebase.json)

spring:
  quartz:
    job-store-type: memory          # H2 in-memory; no persistent job store in dev

logging:
  level:
    com.yosnowmow:                  DEBUG
    org.springframework.security:   DEBUG
